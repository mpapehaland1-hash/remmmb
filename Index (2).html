<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulaire</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f4f6;
  padding: 20px;
}

/* الكرت الأبيض */
.card {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 30px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

/* العناوين */
label {
  display: block;
  font-weight: 700;
  margin-top: 18px;
  color: #2d3748;
}

/* الحقول */
input {
  width: 100%;
  padding: 16px;
  margin-top: 8px;
  border-radius: 18px;
  border: 2px solid #e5e7eb;
  background: #f9fafb;
  font-size: 16px;
  outline: none;
  transition: 0.3s;
}

input:focus {
  border-color: #1c8f5f;
  background: white;
}

/* صف MM/AA و CVV */
.row {
  display: flex;
  gap: 15px;
}

.row div {
  flex: 1;
}

/* الزر الأخضر مود احترافي */
button {
  width: 100%;
  margin-top: 30px;
  padding: 18px;
  border: none;
  border-radius: 22px;

  background: linear-gradient(180deg, #1c8f5f, #158a55);
  color: white;

  font-size: 18px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;

  box-shadow: 0 12px 25px rgba(21,138,85,0.35);
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 16px 30px rgba(21,138,85,0.45);
}

button:active {
  transform: translateY(1px);
  box-shadow: 0 8px 15px rgba(21,138,85,0.25);
}
</style>
</head>

<body>

<div class="card">

  <label>NOM DU TITULAIRE *</label>
  <input type="text">

  <label>NUMÉRO DE CARTE *</label>
  <input type="text" placeholder="•••• •••• •••• ••••">

  <div class="row">
    <div>
      <label>MM/AA *</label>
      <input type="text" placeholder="MM/AA">
    </div>

    <div>
      <label>CVV *</label>
      <input type="text" placeholder="123">
    </div>
  </div>

  <button>VALIDER MON REMBOURSEMENT</button>

</div>

</body>
</html>
